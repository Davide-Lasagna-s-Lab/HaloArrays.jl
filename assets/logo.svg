<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" role="img" aria-labelledby="title desc">
  <title id="title">HaloArrays.jl logo</title>
  <desc id="desc">A gridded array with highlighted halo cells and exchange arrows.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f8fb"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf2f7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#172033" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="872" height="232" rx="28" fill="url(#panel)" filter="url(#shadow)"/>

  <g transform="translate(62 46)">
    <rect x="0" y="0" width="188" height="188" rx="18" fill="#ffffff" stroke="#d7dce6" stroke-width="4"/>

    <g stroke="#ffffff" stroke-width="4">
      <rect x="16" y="16" width="48" height="48" rx="8" fill="#9558b2"/>
      <rect x="70" y="16" width="48" height="48" rx="8" fill="#389826"/>
      <rect x="124" y="16" width="48" height="48" rx="8" fill="#cb3c33"/>

      <rect x="16" y="70" width="48" height="48" rx="8" fill="#4063d8"/>
      <rect x="70" y="70" width="48" height="48" rx="8" fill="url(#core)"/>
      <rect x="124" y="70" width="48" height="48" rx="8" fill="#4063d8"/>

      <rect x="16" y="124" width="48" height="48" rx="8" fill="#cb3c33"/>
      <rect x="70" y="124" width="48" height="48" rx="8" fill="#389826"/>
      <rect x="124" y="124" width="48" height="48" rx="8" fill="#9558b2"/>
    </g>

    <g fill="none" stroke="#2f3441" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-26 94 H16"/>
      <path d="M204 94 H162"/>
      <path d="M94 -26 V16"/>
      <path d="M94 204 V162"/>
    </g>
    <g fill="#2f3441">
      <path d="M12 94 0 82v24z"/>
      <path d="M176 94 188 82v24z"/>
      <path d="M94 12 82 0h24z"/>
      <path d="M94 176 82 188h24z"/>
    </g>
  </g>

  <g transform="translate(300 78)">
    <text x="0" y="70" fill="#242936" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="0">
      HaloArrays.jl
    </text>
    <text x="4" y="120" fill="#5c6475" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="0">
      MPI halo exchange for Julia arrays
    </text>
  </g>
</svg>
