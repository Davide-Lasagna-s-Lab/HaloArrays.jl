  <g transform="translate(382 92)">
    <text x="0" y="58" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="60" font-weight="820" fill="#222734" letter-spacing="0">HaloArrays.jl</text>
    <text x="2" y="102" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#4f596b" letter-spacing="0">Julia arrays with MPI-powered halo exchange.</text>
  </g>
