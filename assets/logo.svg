<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">HaloArrays.jl logo</title>
  <desc id="desc">A compact array block with visible interior cells and Julia-colored halo cells around the boundary.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f2f5f8"/>
    </linearGradient>
    <filter id="panel-shadow" x="-12%" y="-25%" width="124%" height="150%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#172033" flood-opacity="0.14"/>
    </filter>
    <filter id="cell-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#172033" flood-opacity="0.16"/>
    </filter>
    <marker id="mid-arrow" viewBox="0 0 15 10" refX="7.5" refY="5" markerWidth="6.3" markerHeight="4.2" orient="auto">
      <path d="M0 0 L15 5 L0 10 Z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="24" width="912" height="252" rx="24" fill="url(#bg)" filter="url(#panel-shadow)"/>

  <g transform="translate(108.5 64.5) scale(0.9)" filter="url(#cell-shadow)">
    <g opacity="0.92">
      <rect x="12" y="12" width="30" height="30" rx="7" fill="#9558b2"/>
      <rect x="46" y="12" width="30" height="30" rx="7" fill="#9558b2"/>
      <rect x="80" y="12" width="30" height="30" rx="7" fill="#9558b2"/>
      <rect x="114" y="12" width="30" height="30" rx="7" fill="#9558b2"/>
      <rect x="148" y="12" width="30" height="30" rx="7" fill="#9558b2"/>
      <rect x="12" y="46" width="30" height="30" rx="7" fill="#cb3c33"/>
      <rect x="12" y="80" width="30" height="30" rx="7" fill="#cb3c33"/>
      <rect x="12" y="114" width="30" height="30" rx="7" fill="#cb3c33"/>
      <rect x="148" y="46" width="30" height="30" rx="7" fill="#4063d8"/>
      <rect x="148" y="80" width="30" height="30" rx="7" fill="#4063d8"/>
      <rect x="148" y="114" width="30" height="30" rx="7" fill="#4063d8"/>
      <rect x="12" y="148" width="30" height="30" rx="7" fill="#389826"/>
      <rect x="46" y="148" width="30" height="30" rx="7" fill="#389826"/>
      <rect x="80" y="148" width="30" height="30" rx="7" fill="#389826"/>
      <rect x="114" y="148" width="30" height="30" rx="7" fill="#389826"/>
      <rect x="148" y="148" width="30" height="30" rx="7" fill="#389826"/>
    </g>

    <g fill="#667085" opacity="0.9">
      <rect x="46" y="46" width="30" height="30" rx="7"/>
      <rect x="46" y="80" width="30" height="30" rx="7"/>
      <rect x="46" y="114" width="30" height="30" rx="7"/>
      <rect x="80" y="46" width="30" height="30" rx="7"/>
      <rect x="80" y="80" width="30" height="30" rx="7"/>
      <rect x="80" y="114" width="30" height="30" rx="7"/>
      <rect x="114" y="46" width="30" height="30" rx="7"/>
      <rect x="114" y="80" width="30" height="30" rx="7"/>
      <rect x="114" y="114" width="30" height="30" rx="7"/>
    </g>

    <g fill="#ffffff" opacity="0.72">
      <circle cx="61" cy="61" r="4"/>
      <circle cx="61" cy="95" r="4"/>
      <circle cx="61" cy="129" r="4"/>
      <circle cx="95" cy="61" r="4"/>
      <circle cx="95" cy="95" r="4"/>
      <circle cx="95" cy="129" r="4"/>
      <circle cx="129" cy="61" r="4"/>
      <circle cx="129" cy="95" r="4"/>
      <circle cx="129" cy="129" r="4"/>
    </g>

    <g fill="none" stroke="#111827" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M95 -28 L95 4 L95 27" marker-mid="url(#mid-arrow)"/>
      <path d="M218 95 L186 95 L163 95" marker-mid="url(#mid-arrow)"/>
      <path d="M95 218 L95 186 L95 163" marker-mid="url(#mid-arrow)"/>
      <path d="M-28 95 L4 95 L27 95" marker-mid="url(#mid-arrow)"/>
