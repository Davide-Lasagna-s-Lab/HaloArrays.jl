<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" role="img" aria-labelledby="title desc">
  <title id="title">HaloArrays.jl logo</title>
  <desc id="desc">A Julia-colored halo grid with exchange arrows and the HaloArrays.jl wordmark.</desc>
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="cell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f2430"/>
      <stop offset="1" stop-color="#394150"/>
    </linearGradient>
  </defs>

  <g transform="translate(70 38)" filter="url(#soft-shadow)">
    <rect x="30" y="30" width="164" height="164" rx="22" fill="#ffffff"/>
    <rect x="30" y="30" width="164" height="164" rx="22" fill="none" stroke="#d7dde8" stroke-width="3"/>

    <g stroke="#ffffff" stroke-width="3">
      <rect x="44" y="44" width="24" height="24" rx="5" fill="#7f3f98" opacity="0.38"/>
      <rect x="72" y="44" width="24" height="24" rx="5" fill="#389826"/>
      <rect x="100" y="44" width="24" height="24" rx="5" fill="#389826"/>
      <rect x="128" y="44" width="24" height="24" rx="5" fill="#389826"/>
      <rect x="156" y="44" width="24" height="24" rx="5" fill="#cb3c33" opacity="0.38"/>

      <rect x="44" y="72" width="24" height="24" rx="5" fill="#4063d8"/>
      <rect x="72" y="72" width="24" height="24" rx="5" fill="url(#cell)"/>
      <rect x="100" y="72" width="24" height="24" rx="5" fill="url(#cell)"/>
      <rect x="128" y="72" width="24" height="24" rx="5" fill="url(#cell)"/>
      <rect x="156" y="72" width="24" height="24" rx="5" fill="#9558b2"/>

      <rect x="44" y="100" width="24" height="24" rx="5" fill="#4063d8"/>
      <rect x="72" y="100" width="24" height="24" rx="5" fill="url(#cell)"/>
      <rect x="100" y="100" width="24" height="24" rx="5" fill="#ffffff"/>
      <rect x="128" y="100" width="24" height="24" rx="5" fill="url(#cell)"/>
      <rect x="156" y="100" width="24" height="24" rx="5" fill="#9558b2"/>

      <rect x="44" y="128" width="24" height="24" rx="5" fill="#4063d8"/>
      <rect x="72" y="128" width="24" height="24" rx="5" fill="url(#cell)"/>
      <rect x="100" y="128" width="24" height="24" rx="5" fill="url(#cell)"/>
      <rect x="128" y="128" width="24" height="24" rx="5" fill="url(#cell)"/>
      <rect x="156" y="128" width="24" height="24" rx="5" fill="#9558b2"/>

      <rect x="44" y="156" width="24" height="24" rx="5" fill="#cb3c33" opacity="0.38"/>
      <rect x="72" y="156" width="24" height="24" rx="5" fill="#cb3c33"/>
      <rect x="100" y="156" width="24" height="24" rx="5" fill="#cb3c33"/>
      <rect x="128" y="156" width="24" height="24" rx="5" fill="#cb3c33"/>
      <rect x="156" y="156" width="24" height="24" rx="5" fill="#7f3f98" opacity="0.38"/>
    </g>

    <rect x="71" y="71" width="83" height="83" rx="12" fill="none" stroke="#263244" stroke-opacity="0.16" stroke-width="3"/>

    <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="7">
      <path d="M13 112h30" stroke="#4063d8"/>
      <path d="M221 112h-30" stroke="#9558b2"/>
      <path d="M112 13v30" stroke="#389826"/>
      <path d="M112 221v-30" stroke="#cb3c33"/>
    </g>
    <g>
      <path d="M45 112 31 101v22z" fill="#4063d8"/>
      <path d="M187 112 201 101v22z" fill="#9558b2"/>
      <path d="M112 45 101 31h22z" fill="#389826"/>
      <path d="M112 187 101 201h22z" fill="#cb3c33"/>
    </g>
  </g>

  <g transform="translate(310 78)">
    <text x="0" y="70" fill="url(#ink)" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="62" font-weight="850" letter-spacing="0">
      HaloArrays.jl
    </text>
    <text x="3" y="116" fill="#596273" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="0">
      MPI halo exchange for structured Julia arrays
    </text>
    <g transform="translate(5 144)">
      <rect x="0" y="0" width="58" height="8" rx="4" fill="#4063d8"/>
      <rect x="68" y="0" width="58" height="8" rx="4" fill="#389826"/>
      <rect x="136" y="0" width="58" height="8" rx="4" fill="#cb3c33"/>
      <rect x="204" y="0" width="58" height="8" rx="4" fill="#9558b2"/>
    </g>
  </g>
</svg>
