<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 260" role="img" aria-labelledby="title desc">
  <title id="title">HaloArrays.jl logo</title>
  <desc id="desc">A structured grid with Julia-colored halo faces and exchange arrows beside the HaloArrays.jl wordmark.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f8fb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#172033" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9 Z" fill="#4063d8"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9 Z" fill="#9558b2"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9 Z" fill="#389826"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9 Z" fill="#cb3c33"/>
    </marker>
  </defs>

  <rect x="24" y="24" width="792" height="212" rx="28" fill="url(#panel)" filter="url(#shadow)"/>

  <g transform="translate(70 42)">
    <g fill="none" stroke-linecap="round">
      <rect x="38" y="24" width="288" height="176" rx="20" fill="#ffffff" stroke="#d7dce6" stroke-width="2"/>

      <g stroke="#d7dce6" stroke-width="2">
        <line x1="86" y1="28" x2="86" y2="196"/>
        <line x1="278" y1="28" x2="278" y2="196"/>
        <line x1="42" y1="64" x2="322" y2="64"/>
        <line x1="42" y1="160" x2="322" y2="160"/>

        <line x1="134" y1="68" x2="134" y2="156"/>
        <line x1="182" y1="68" x2="182" y2="156"/>
        <line x1="230" y1="68" x2="230" y2="156"/>
        <line x1="90" y1="88" x2="274" y2="88"/>
        <line x1="90" y1="112" x2="274" y2="112"/>
        <line x1="90" y1="136" x2="274" y2="136"/>
      </g>

      <rect x="86" y="64" width="192" height="96" rx="8" stroke="#2f3441" stroke-width="3" opacity="0.24"/>

      <g stroke-width="9">
        <line x1="104" y1="42" x2="260" y2="42" stroke="#389826"/>
        <line x1="104" y1="182" x2="260" y2="182" stroke="#cb3c33"/>
        <line x1="62" y1="82" x2="62" y2="142" stroke="#4063d8"/>
        <line x1="304" y1="82" x2="304" y2="142" stroke="#9558b2"/>
      </g>

      <g stroke-width="4" stroke-linejoin="round">
        <path d="M18 112 H58" stroke="#4063d8" marker-end="url(#arrow-blue)"/>
        <path d="M346 112 H306" stroke="#9558b2" marker-end="url(#arrow-purple)"/>
        <path d="M182 4 V40" stroke="#389826" marker-end="url(#arrow-green)"/>
        <path d="M182 220 V184" stroke="#cb3c33" marker-end="url(#arrow-red)"/>
      </g>

      <g stroke="#b7bfce" stroke-width="2" opacity="0.7">
        <path d="M44 48 H76"/>
        <path d="M294 48 H320"/>
        <path d="M44 176 H76"/>
        <path d="M294 176 H320"/>
      </g>
    </g>
  </g>

  <g transform="translate(424 68)">
    <text x="0" y="54" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" fill="#242936" letter-spacing="0">HaloArrays.jl</text>
    <text x="2" y="92" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#5c6475" letter-spacing="0">MPI halo exchange</text>
    <text x="2" y="120" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#5c6475" letter-spacing="0">for structured Julia arrays</text>
  </g>
</svg>
